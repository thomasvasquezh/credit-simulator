spring:
  application:
    name: credit-simulator-backend

  datasource:
    url: jdbc:mysql://localhost:3307/credit_simulator_db
    username: credit_user
    password: credit_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080